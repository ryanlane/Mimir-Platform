name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: API lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mimir-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mimir-api/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest
      - name: Ruff
        run: ruff check app/
      - name: Tests
        run: pytest tests/ -x -q

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mimir-web/mimir-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mimir-web/mimir-ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # CRA treats warnings as errors when CI=true; build is the smoke test here.
          CI: "false"
