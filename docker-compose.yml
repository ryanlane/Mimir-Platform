name: mimir

# Default use: run app services in Docker on a native Ubuntu server.
# For physical displays on a LAN, copy .env.hybrid.example to .env and set
# PUBLIC_HOST / MQTT_PUBLIC_HOST to the server's real LAN address.
# Preferred discovery path on Ubuntu: run mimir-discovery natively on the host.
# The optional discovery service below is mainly for convenience on native Linux.

services:
  db:
    image: postgres:16-alpine
    container_name: mimir-db
    environment:
      POSTGRES_DB: mimir
      POSTGRES_USER: mimir
      # Set POSTGRES_PASSWORD in the root .env. NOTE: only takes effect on a
      # fresh volume; for an existing database run scripts/phase0_harden.sh
      # which rotates the password via ALTER USER.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mimir}
    ports:
      # Localhost only — the host-networked API and local tools are the only consumers.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimir -d mimir"]
      interval: 5s
      timeout: 3s
      retries: 30

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mimir-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mimirframe.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: "80"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      # Localhost only — for remote access use an SSH tunnel:
      #   ssh -L 5050:127.0.0.1:5050 user@server
      - "127.0.0.1:5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mimir-redis
    ports:
      # Localhost only — the host-networked API is the only consumer.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mimir-mqtt
    network_mode: "host"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Password file generated by scripts/phase0_harden.sh (mosquitto_passwd).
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mqtt_data:/mosquitto/data
    restart: unless-stopped
    healthcheck:
      # Uses the anonymous localhost-only listener (1884); 1883 requires auth.
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-p", "1884", "-t", "health", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./mimir-api
      dockerfile: Dockerfile
    container_name: mimir-api
    network_mode: "host"
    env_file:
      - ./mimir-api/mimir-api.docker.env
    environment:
      # API runs on the host network, so dependencies must be reached through
      # the host-published ports rather than Docker service DNS.
      - DB_URL=postgresql+psycopg2://mimir:${POSTGRES_PASSWORD:-mimir}@127.0.0.1:5432/mimir
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      # API talks to the anonymous localhost-only listener (1884). Displays
      # use the authenticated LAN listener via MQTT_PUBLIC_PORT (1883).
      - MQTT_HOST=127.0.0.1
      - MQTT_PORT=1884
      # Public-facing values for physical devices.
      # On an Ubuntu server, set these in the root .env file using
      # .env.hybrid.example as the template.
      - PUBLIC_HOST
      - PUBLIC_MDNS_HOST
      - MQTT_PUBLIC_HOST
      - MQTT_PUBLIC_PORT
      # MQTT auth (set in root .env; scripts/phase0_harden.sh wires it all up).
      # MQTT_EXPOSE_CREDENTIALS=true lets displays fetch broker credentials
      # from the bootstrap/config endpoints during onboarding.
      - MQTT_USER
      - MQTT_PASSWORD
      - MQTT_EXPOSE_CREDENTIALS
    volumes:
      # Uploads stored in ./data/uploads so they're easy to back up alongside the repo
      - ./data/uploads:/var/opt/mimir/mimir-api/uploads
      # Bind-mount channel plugins from repo (read-only)
      - ./mimir-api/channels:/var/opt/mimir/mimir-api/channels:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        set -e
        echo "--- Running database migrations ---"
        alembic upgrade head
        echo "--- Migrations complete, starting API ---"
        exec uvicorn app.main:app --host 0.0.0.0 --port 5000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./mimir-web/mimir-ui
      dockerfile: Dockerfile
    container_name: mimir-web
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Override the API URL for LAN/remote deployments where the browser reaches
      # the API from a different host or port than the default runtime detection.
      # Example: REACT_APP_API_URL=http://mimir.local:5000
      - REACT_APP_API_URL
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  discovery:    
    build:
      context: ./mimir-discovery/python
      dockerfile: Dockerfile
    container_name: mimir-discovery
    # Optional discovery helper for native Linux only.
    # Preferred production path on Ubuntu: run discovery natively on the host
    # via mimir-discovery.service.example so the server exposes its real LAN identity.
    # Avoid relying on this container for Windows/WSL2 hardware validation.
    network_mode: "host"
    profiles: ["discovery"]    
    environment:
      - MIMIR_API_BASE=http://127.0.0.1:5000
      - MIMIR_PUBLIC_HOSTNAME
      # Optional shared secret; must match API MDNS_EXTERNAL_FEED_TOKEN if set
      - MIMIR_DISCOVERY_TOKEN
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:
  mqtt_data:
