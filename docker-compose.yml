# Docker Compose for Mimir Development Environment
# Adds Redis service for distribution features

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: mimir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - REDIS_MAXMEMORY=256mb
      - REDIS_MAXMEMORY_POLICY=allkeys-lru

volumes:
  redis_data:
    driver: local

# To use this Redis service with the Mimir API:
# 1. Start Redis: docker-compose up -d redis
# 2. Set environment variables:
#    - REDIS_HOST=localhost
#    - REDIS_PORT=6379
# 3. Start the API service
#
# For production, consider:
# - Adding Redis password authentication
# - Using Redis Sentinel for high availability
# - Enabling TLS encryption
# - Setting up proper monitoring
