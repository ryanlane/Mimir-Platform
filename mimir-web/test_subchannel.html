<!DOCTYPE html>
<html>
<head>
    <title>Subchannel Test</title>
</head>
<body>
    <h1>Testing Subchannel API</h1>
    <div id="results"></div>
    
    <script>
        async function testSubchannelAPI() {
            const resultsDiv = document.getElementById('results');
            
            try {
                // Test the subchannel requirements API
                const response = await fetch('http://mimir.local:5000/api/channels/com.epaperframe.photoframe/subchannel-config');
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <h2>API Response:</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    
                    <h2>Parsed Data:</h2>
                    <p><strong>Supports Subchannels:</strong> ${data.supports_subchannels}</p>
                    <p><strong>Requires Subchannel:</strong> ${data.requires_subchannel}</p>
                    <p><strong>Available Subchannels:</strong> ${data.subchannels?.length || 0}</p>
                    ${data.subchannels?.map(sc => `<li>${sc.name} (${sc.id})</li>`).join('') || 'None'}
                `;
            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        testSubchannelAPI();
    </script>
</body>
</html>
