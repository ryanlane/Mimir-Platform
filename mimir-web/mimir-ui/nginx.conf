upstream mimir_api {
  server host.docker.internal:5000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # ^~ prevents the aggressive caching regex below from overriding these proxy
  # locations for paths like /api/something.js or /media/img.jpg.
  # $http_host (not $host) keeps the port in the Host header, so upstream
  # redirects (e.g. FastAPI's trailing-slash 307s) point back at the web
  # origin (host:8080) instead of bare port 80.

  location ^~ /api/ {
    proxy_pass http://mimir_api;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket upgrade — prefix ^~ so /ws and /ws/display/:id are both covered
  location ^~ /ws {
    proxy_pass http://mimir_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  location ^~ /media/ {
    proxy_pass http://mimir_api;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Web Screen display pages (/d/<token>) — browser-only displays served by
  # the API; proxied here so tablets can use the web origin too.
  location ^~ /d/ {
    proxy_pass http://mimir_api;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Cache React build static assets aggressively.
  # NOTE: /channels/ is intentionally NOT proxied here — it conflicts with
  # the React Router /channels and /channels/:id SPA routes.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback — serves index.html for all other paths (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
