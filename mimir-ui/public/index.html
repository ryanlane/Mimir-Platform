<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Mimir Display Control - Manage scenes and displays for your digital signage system"
    />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Mimir UI</title>
    <script>
      // Mobile debugging and connection helper
      (function() {
        // Enhanced mobile debugging
        window.mimirDebug = {
          platform: navigator.platform,
          userAgent: navigator.userAgent,
          isMobile: /Mobi|Android/i.test(navigator.userAgent),
          isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
          isSafari: /^((?!chrome|android).)*safari/i.test(navigator.userAgent),
          networkType: navigator.connection ? navigator.connection.effectiveType : 'unknown',
          timestamp: new Date().toISOString()
        };
        
        // Log device info for debugging
        console.log('📱 Mimir Device Info:', window.mimirDebug);
        
        // Test network connectivity
        window.mimirDebug.testConnection = function(url) {
          const testUrl = url || (window.location.protocol + '//' + window.location.hostname + ':5000/api/health');
          console.log('🔍 Testing connection to:', testUrl);
          
          return fetch(testUrl, { 
            method: 'GET',
            cache: 'no-cache',
            signal: AbortSignal.timeout(5000)
          })
          .then(response => {
            console.log('✅ Connection test successful:', response.status);
            return { success: true, status: response.status };
          })
          .catch(error => {
            console.error('❌ Connection test failed:', error.message);
            return { success: false, error: error.message };
          });
        };
        
        // Auto-test connection on mobile devices
        if (window.mimirDebug.isMobile) {
          setTimeout(() => {
            window.mimirDebug.testConnection();
          }, 2000);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
