# Mimir MQTT broker configuration (Eclipse Mosquitto 2)
#
# Two listeners (per_listener_settings):
#
#   1883 on 0.0.0.0  — LAN-facing, used by display clients. Requires
#                      username/password from /mosquitto/config/passwd.
#   1884 on 127.0.0.1 — localhost-only, anonymous. Used by the host-networked
#                      API container, the compose healthcheck, and local debug
#                      tooling (task mqtt:sub / mqtt:pub). Anyone with shell
#                      access to the server can already do worse, so localhost
#                      anonymity costs nothing and keeps local plumbing simple.
#
# The password file is generated by scripts/phase0_harden.sh:
#   docker run --rm -v "$(pwd)/mosquitto:/work" eclipse-mosquitto:2 \
#     mosquitto_passwd -c -b /work/passwd <user> <password>
#
# Display clients receive these credentials automatically during bootstrap
# when the API has MQTT_EXPOSE_CREDENTIALS=true and MQTT_USER/MQTT_PASSWORD set.
#
# Temporary rollback (e.g. while migrating an existing fleet): change
# "allow_anonymous false" to "true" under the 1883 listener and restart the
# mqtt container.

per_listener_settings true

# --- LAN listener: displays ---
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

# --- Localhost listener: API / healthcheck / debug ---
listener 1884 127.0.0.1
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
