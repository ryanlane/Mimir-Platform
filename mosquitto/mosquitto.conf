# Mimir MQTT broker configuration (Eclipse Mosquitto 2)
#
# Default: anonymous access, suitable for local/home network deployments.
# If you want to restrict access (e.g. when exposing port 1883 on a shared
# or public network), follow the steps below to enable password auth.
#
# --- Enabling authentication ---
#
# 1. Generate a password file (run once on the host):
#      docker run --rm -v $(pwd)/mosquitto:/mosquitto/config \
#        eclipse-mosquitto:2 \
#        mosquitto_passwd -c /mosquitto/config/passwd <username>
#
# 2. Uncomment the three lines below and comment out allow_anonymous true:
#
#      allow_anonymous false
#      password_file /mosquitto/config/passwd
#
# 3. In docker-compose.yml, mount the password file into the container:
#      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
#
# 4. Set MQTT_USER and MQTT_PASSWORD in mimir-api.docker.env (or as env
#    vars in the api service) to match the credentials created in step 1.

# Allow TCP connections from other containers/hosts
listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
