# Mimir MQTT broker configuration — DEV/WSL stacks only.
#
# Anonymous access on a bridge network for local development. The production
# compose uses mosquitto.conf, which requires authentication on the LAN
# listener. Do not use this file on a server with real displays.

listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
