name: mimir

# WSL-friendly local stack.
# Use this when developing from WSL/Windows and you need predictable browser
# access on localhost with normal Docker bridge networking.
#
# This is intentionally separate from docker-compose.yml, which is tuned for a
# native Ubuntu host with host-networked API/MQTT for real LAN hardware.

services:
  db:
    image: postgres:16-alpine
    container_name: mimir-db
    environment:
      POSTGRES_DB: mimir
      POSTGRES_USER: mimir
      POSTGRES_PASSWORD: mimir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimir -d mimir"]
      interval: 5s
      timeout: 3s
      retries: 30

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mimir-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mimirframe.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: "80"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mimir-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mimir-mqtt
    ports:
      - "1883:1883"
    volumes:
      # WSL/dev uses the anonymous config; production mosquitto.conf requires auth.
      - ./mosquitto/mosquitto.dev.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./mimir-api
      dockerfile: Dockerfile
    container_name: mimir-api
    env_file:
      - ./mimir-api/mimir-api.docker.env
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - PUBLIC_HOST
      - PUBLIC_MDNS_HOST
      - MQTT_PUBLIC_HOST
      - MQTT_PUBLIC_PORT
    ports:
      - "5000:5000"
    volumes:
      - ./data/uploads:/var/opt/mimir/mimir-api/uploads
      - ./mimir-api/channels:/var/opt/mimir/mimir-api/channels:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
        set -e
        echo "--- Running database migrations ---"
        alembic upgrade head
        echo "--- Migrations complete, starting API ---"
        exec uvicorn app.main:app --host 0.0.0.0 --port 5000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./mimir-web/mimir-ui
      dockerfile: Dockerfile
    container_name: mimir-web
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:
  mqtt_data:
